name: Bug report
description: Report a problem with Universal 3D Previewer
title: "Bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Please include enough detail so the issue can be reproduced.
  - type: input
    id: macos-version
    attributes:
      label: macOS version
      description: Example: macOS 15.5 Sequoia
      placeholder: macOS version
      value: "macOS "
    validations:
      required: true
  - type: dropdown
    id: file-type
    attributes:
      label: File type
      options:
        - STEP / STP
        - STL
        - OBJ
        - PLY
        - 3MF
        - G-code
        - Alembic / ABC
        - Other
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the problem you saw in Finder, Quick Look, thumbnails, or the app.
      value: |
        What I did:

        What happened:

        Where I saw it:
        - Finder thumbnail
        - Finder Quick Look preview
        - Universal 3D Previewer app
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      value: |
        I expected:
    validations:
      required: true
  - type: checkboxes
    id: troubleshooting
    attributes:
      label: Troubleshooting tried
      options:
        - label: I restarted Finder.
        - label: I refreshed the Quick Look cache.
        - label: I rebooted my Mac.
  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Add screenshots, sample file details, or other context if helpful.
      value: |
        Screenshots, sample file details, or other notes:
